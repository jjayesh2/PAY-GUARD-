# Server Port (Render binds this dynamically via PORT env var)
server.port=${PORT:8080}

# H2 File-Based Database Configuration
spring.datasource.url=jdbc:h2:file:./data/payguard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA and Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console Settings (for development and demo inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Razorpay Test Mode Configurations
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# Allowed Frontend URL for CORS configuration (default to local Vite React port)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Enable Spring scheduling for Reconciliation scheduler
spring.main.allow-bean-definition-overriding=true
